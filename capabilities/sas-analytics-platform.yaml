apiVersion: naftiko.dev/v1
kind: Capability
metadata:
  name: sas-analytics-platform
  provider: sas
  description: >-
    Composite capability spanning SAS Viya analytic operations: model
    governance, decisioning, reporting, and job execution.
spec:
  workflows:
    - name: model-lifecycle
      description: Register, publish, and monitor a SAS model via REST
      steps:
        - id: list-projects
          operation: listModelProjects
        - id: register-model
          operation: registerModel
          dependsOn: list-projects
        - id: publish-model
          operation: publishModel
          dependsOn: register-model
    - name: execute-decision
      description: Invoke a versioned decision flow with an input record
      steps:
        - id: list-flows
          operation: listDecisionFlows
        - id: get-flow
          operation: getDecisionFlow
          dependsOn: list-flows
    - name: run-job
      description: Submit a SAS Viya job and poll for completion
      steps:
        - id: create-job
          operation: createJob
        - id: get-job
          operation: getJob
          dependsOn: create-job
    - name: embed-report
      description: Locate a Visual Analytics report for embedding
      steps:
        - id: list-reports
          operation: listReports
        - id: get-report
          operation: getReport
          dependsOn: list-reports
  authentication:
    type: oauth2
    notes: SAS Logon issues OAuth tokens used across all Viya REST APIs
