apis:
  - aid: sas:viya-rest-api
    name: SAS Viya REST API
    tags:
      - Analytics
      - Machine Learning
      - Data Management
      - Decisions
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
