description: >-
  SAS Institute is a global leader in analytics, AI, and data management software. SAS Viya, its cloud-native platform,
  exposes a comprehensive catalog of REST APIs covering data management, machine learning, decisions, reports,
  identities, and platform administration. The Viya REST API surface enables embedding analytics, automating model
  lifecycles, and integrating governed AI into business workflows.
created: '2026-05-05'
modified: '2026-05-19'
