        type: SDKs
      - url: openapi/sas-viya-rest-api-openapi.yml
        type: OpenAPI
      - url: json-schema/sas-viya-rest-api-job-schema.json
        type: JSONSchema
      - url: json-schema/sas-viya-rest-api-report-schema.json
        type: JSONSchema
      - url: json-schema/sas-viya-rest-api-decision-schema.json
        type: JSONSchema
      - url: json-ld/sas-viya-rest-api-context.jsonld
        type: JSONLD
    description: >-
      The SAS Viya REST API spans 50+ endpoint groups covering Cloud Analytic Services (CAS), Compute, Data Management
      (Data Sources, Data Tables, Data Quality), Model Management, Decisions, Business Rules, Reports, Visual Analytics,
      Identities, Authorization, Files, Folders, Jobs, and Logon (OAuth). Together they let developers automate SAS Viya
      analytic workloads, publish models, embed reports, and govern AI lifecycles.
